# 数据模型模板

model_name: "{模型名称}"
version: "1.0.0"
description: "{模型描述}"

fields:
  - name: "id"
    type: "uuid"
    primary_key: true
    description: "主键 ID"
    nullable: false

  - name: "{字段名}"
    type: "string|integer|boolean|datetime|json|enum"
    description: "{字段描述}"
    nullable: true|false
    default: "{默认值}"
    validation:
      - rule: "min_length|max_length|min_value|max_value|pattern"
        value: "{值}"
      - rule: "required|unique"
        value: true

  - name: "created_at"
    type: "datetime"
    description: "创建时间"
    nullable: false
    auto_create: true

  - name: "updated_at"
    type: "datetime"
    description: "更新时间"
    nullable: false
    auto_update: true

indexes:
  - name: "idx_{字段名}"
    fields:
      - "{字段名}"
    unique: true|false

relations:
  - name: "{关系名}"
    type: "hasOne|hasMany|belongsTo|belongsToMany"
    target: "{目标模型}"
    foreign_key: "{外键字段}"

enums:
  - name: "{枚举名}"
    values:
      - value: "{值}"
        description: "{描述}"
