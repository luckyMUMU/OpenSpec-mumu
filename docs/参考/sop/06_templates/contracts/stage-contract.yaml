# 阶段契约模板

stage_id: "stage-{N}-{unique_id}"
stage_name: "阶段名称"
version: "1.0.0"

preconditions:
  required_inputs:
    - name: "input_name"
      type: "file|data"
      path: "输入路径"
      validation: "验证规则"
  constraints:
    - "前置约束条件"

postconditions:
  required_outputs:
    - name: "output_name"
      type: "file|data"
      path: "输出路径"
      format: "格式定义"
  guarantees:
    - "输出保证"

invariants:
  - "不变式 1"
  - "不变式 2"

context:
  context_id: "ctx-stage-{N}-{timestamp}"
  created_at: "时间戳"
  expires_at: "过期时间"
  data:
    key: "上下文数据"
